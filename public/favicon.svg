<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <style>
    .badge { fill: #14B8A6; }
    .icon-stroke { stroke: white; }
    .icon-fill   { fill: white; }
    @media (prefers-color-scheme: dark) {
      .badge       { fill: white; }
      .icon-stroke { stroke: #14B8A6; }
      .icon-fill   { fill: #14B8A6; }
    }
  </style>

  <!-- Teal rounded-square badge -->
  <rect class="badge" width="32" height="32" rx="6"/>

  <!-- Podcast icon scaled to 85% of badge (27.2px), centred (offset 2.4px) -->
  <g transform="translate(2.4, 2.4) scale(1.133)">
    <!-- Outer arc -->
    <path class="icon-stroke" d="M16.85 18.58a9 9 0 1 0-9.7 0"
      stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <!-- Inner arc -->
    <path class="icon-stroke" d="M8 14a5 5 0 1 1 8 0"
      stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <!-- Head dot -- stroke added to match Lucide root stroke-width -->
    <circle class="icon-fill icon-stroke" cx="12" cy="11" r="1" stroke-width="2.2"/>
    <!-- Body teardrop -- stroke added for same reason -->
    <path class="icon-fill icon-stroke" d="M13 17a1 1 0 1 0-2 0l.5 4.5a0.5 0.5 0 0 0 1 0z"
      stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
